# config/models.toml
# Model routing for autoscientist agents. Resolved at runtime by clients/router.py.
#
# Two-layer indirection: agents -> model alias -> provider. The indirection lets
# operators retarget many agents at once (e.g. swap `claude_sonnet` to point at
# claude-opus for a hard project) without editing every agent entry.

#
# Provider definitions
#
[providers.claude]
type = "anthropic"
api_key_env = "ANTHROPIC_API_KEY"

[providers.ollama]
type = "openai_compat"
base_url_env = "OLLAMA_BASE_URL"
base_url_default = "http://localhost:11434/v1"
api_key = "ollama"  # placeholder; Ollama ignores it but the OpenAI SDK requires non-empty

[providers.mock]
# Deterministic in-process provider for Phase 1 stub agents.
# Real agents (Phase 2+) never use this.
type = "mock"

#
# Model aliases.
# Pricing values are approximate USD per million tokens; see
# https://www.anthropic.com/pricing for current numbers. Used only by the
# budget *estimator*. Final accounting uses the `usage` field returned by
# the API, so estimator drift is bounded by the per-call cost ceiling.
#
[models.claude_sonnet]
provider = "claude"
model_id = "claude-sonnet-4-6"
prompt_usd_per_mtok = 3.0
output_usd_per_mtok = 15.0
default_max_tokens = 4096

[models.claude_haiku]
provider = "claude"
model_id = "claude-haiku-4-5-20251001"
prompt_usd_per_mtok = 1.0
output_usd_per_mtok = 5.0
default_max_tokens = 4096

[models.claude_opus]
# Opt-in only. Not in the default routing per KICKOFF.md §6.
provider = "claude"
model_id = "claude-opus-4-7"
prompt_usd_per_mtok = 15.0
output_usd_per_mtok = 75.0
default_max_tokens = 4096
# This Opus model rejects the `temperature` parameter ("temperature is
# deprecated for this model", HTTP 400). Surfaced 2026-05-31 when paper_writer
# (the only opus-routed agent) ran for the first time and crashed. The router
# drops temperature for models with supports_temperature=false; claude.py also
# self-heals defensively. Default for all other models is true.
supports_temperature = false

[models.claude_opus_48]
# 2026-06-18 (fix 4, take 2): Opus 4.8 for code_gen/test_gen after BOTH local
# models failed to converge — qwen3-coder (A3B MoE) made subtle math errors and
# qwen2.5:32b (dense) sprayed files / skipped check_imports (20 blockers). Opus
# 4.8 is the strongest available model; the bet is it converges the code in 1-2
# cycles where Sonnet would too but Opus is more likely to nail the math/API in
# one shot. EXPENSIVE: $15/$75 per Mtok (5x Sonnet, 25x local-$0). Separate from
# [models.claude_opus] (4.7, paper_writer) so that agent is untouched. Unlike
# 4.7, 4.8 is a normal model — temperature supported (default true); claude.py
# self-heals if any temperature quirk surfaces. Revert: repoint code_gen/test_gen
# to "qwen3_coder" (local $0) or "claude_sonnet" (cheaper cloud).
provider = "claude"
model_id = "claude-opus-4-8"
prompt_usd_per_mtok = 15.0
output_usd_per_mtok = 75.0
default_max_tokens = 16384  # code needs room to emit a full file in one call
# 2026-06-18: confirmed live — Opus 4.8 ALSO rejects `temperature` (HTTP 400),
# like 4.7. claude.py self-heals (retries without it), but set this so the
# router drops temperature upfront and avoids a wasted 400+retry on every call.
supports_temperature = false

[models.qwen_27b]
# qwen3.6:27b is a thinking model; chain-of-thought is emitted on a
# separate `reasoning` field via the OpenAI-compat shim. With no_think=true
# the client appends "/no_think" to the system prompt to suppress reasoning
# and keep token budgets predictable.
provider = "ollama"
model_id = "qwen3.6:27b"
prompt_usd_per_mtok = 0.0
output_usd_per_mtok = 0.0
default_max_tokens = 8192
no_think = true

[models.qwen_27b_thinking]
provider = "ollama"
model_id = "qwen3.6:27b"
prompt_usd_per_mtok = 0.0
output_usd_per_mtok = 0.0
default_max_tokens = 65536
no_think = false

[models.qwen25_coder]
# qwen2.5:32b — the local tool-calling workhorse for code_gen/test_gen.
# Chosen over qwen3.6:27b for the agentic code loop after the 2026-05-31
# audit: a verified round-trip through clients/ollama.py
# (scripts/smoke_local_toolcall.py) showed qwen2.5:32b emits clean OpenAI
# tool_calls with *zero* reasoning tokens (finish_reason=tool_calls,
# reasoning_chars=0), whereas qwen3.6:27b — a thinking model — still spends
# ~100-260 reasoning tokens per call even under /no_think and is prone to the
# planning-oscillation the shim has to detect and retry around. For the two
# highest-volume agents that closes the agentic loop locally for $0 instead of
# paying Claude prices (test_gen alone was 62% of lifetime spend). Both Qwen
# models tool-call correctly; this is the cheaper, more predictable default.
provider = "ollama"
model_id = "qwen2.5:32b"
prompt_usd_per_mtok = 0.0
output_usd_per_mtok = 0.0
default_max_tokens = 8192
no_think = true  # qwen2.5 is not a thinking model; flag is a harmless no-op

[models.qwen3_coder]
# qwen3-coder:30b (Qwen3-Coder-30B-A3B, q4_K_M, ~19 GB) — the intended
# successor to qwen25_coder for the code_gen/test_gen agentic loop. A coder-
# tuned MoE (30B total, ~3B active): runs at ~3B speed but reasons near 30B.
# Unlike qwen3.6:27b it is the *non-thinking* Coder/Instruct variant with
# native function-calling, so it avoids the reasoning-token waste and
# planning-oscillation that ruled qwen3.6:27b out for the tool loop (see the
# qwen25_coder note). Fits the 32 GB RTX 5090 with ~11 GB left for KV cache.
# NOT YET LIVE: code_gen/test_gen are repointed here (below) only after the
# model is pulled AND scripts/smoke_local_toolcall.py confirms clean tool_calls.
provider = "ollama"
# 2026-06-11: was "qwen3-coder:30b". Switched to the 64k-context variant built
# from config/qwen3-coder-64k.Modelfile (`ollama create qwen3-coder-30b-64k`).
# The stock model loads at num_ctx=32768 (server default; /v1 ignores per-request
# num_ctx), which code_gen's debug loop FILLED -> the final turn truncated
# (finish_reason="length", ~23 tokens) -> no HANDOFF emitted -> runner marked the
# run "completed" with 0 handoffs (empty console). Run run_f6fb98…, 2026-06-11.
# The 64k variant loads at 25 GB / 100% GPU on the 5090 (verified via `ollama ps`).
# Revert: restore model_id = "qwen3-coder:30b".
model_id = "qwen3-coder-30b-64k"
prompt_usd_per_mtok = 0.0
output_usd_per_mtok = 0.0
# 2026-06-11: raised 8192 -> 16384. Per-call OUTPUT cap (num_predict). 8192 was
# NOT hit in the successful run (code_gen + test_gen both handed off cleanly),
# but this gives Qwen room to emit a large file in one write_file call without
# truncation (finish_reason="length" in the JSONL would flag a real hit). Local
# => $0; only costs more KV cache (the 5090 has ~11 GB free). NOTE: this is the
# output length only — NOT the context window (num_ctx, Ollama-side) nor the
# per-call HTTP timeout (clients/ollama.py _get_client timeout=180s). Raise the
# 180s timeout too if a single generation ever exceeds it.
default_max_tokens = 16384
no_think = true  # non-thinking coder model; flag is a harmless no-op (as with qwen2.5)

[models.qwen25_32b]
# fix 4 (2026-06-18): DENSE 32B, the stronger replacement for qwen3_coder
# (qwen3-coder-30b is an A3B MoE — only ~3B *active* params, the likely root of
# the subtle numerical-reasoning bugs that kept failing code_review). Dense 32B
# = all 32B active, for more consistent numerical reasoning.
# NOTE: the coder-tuned qwen2.5-coder:32b was the first pick but it does NOT emit
# structured OpenAI tool_calls through Ollama's /v1 shim (returns the call as
# text -> n_tool_calls=0, validated via scripts/smoke_local_toolcall.py), so it
# can't drive the agentic loop. The GENERAL qwen2.5:32b tool-calls cleanly (the
# repo's documented qwen25_coder behaviour) and is still strong at code/math.
# Built into a context-maximised variant (config/qwen2.5-32b-64k.Modelfile,
# `ollama create qwen2.5-32b-64k -f ...`). Ollama auto-fits num_ctx to VRAM:
# loads ~32768 at 28GB / 100% GPU on the 32GB RTX 5090 (verified). Trade-off:
# dense 32B is slower than the MoE and capped at ~32k context here. Revert by
# repointing code_gen/test_gen back to "qwen3_coder".
provider = "ollama"
model_id = "qwen2.5-32b-64k"
prompt_usd_per_mtok = 0.0
output_usd_per_mtok = 0.0
default_max_tokens = 16384
no_think = true  # qwen2.5 is not a thinking model; flag is a harmless no-op

[models.qwen36_27b]
# 2026-06-22: official qwen3.6:27b (dense 27.8B, arch qwen35) as the
# Opus-orchestrator's local code_worker, run in THINKING mode. Re-validated as a
# clean tool-caller with NO oscillation on a realistic write_file -> check_imports
# -> handoff sequence at a 64k budget — superseding the old "qwen3.6 ruled out for
# planning-oscillation" verdict, which was an earlier build forced under /no_think.
# model_id is the 64k-context variant (config/qwen3.6-27b-64k.Modelfile,
# `ollama create qwen3.6-27b-64k -f ...`); measured 21GB / 100% GPU / 64k ctx on
# the 32GB RTX 5090. no_think=false: thinking helps it plan the file breakdown and
# is concise/non-looping here; clients/ollama.py's _detect_reasoning_loop remains
# the safety net if it ever oscillates. Revert: repoint [agents.code_worker] to
# "qwen25_32b".
provider = "ollama"
model_id = "qwen3.6-27b-64k"
prompt_usd_per_mtok = 0.0
output_usd_per_mtok = 0.0
default_max_tokens = 16384
no_think = false  # thinking model; validated clean tool-calling in thinking mode

[models.mock_stub]
# Used by Phase 1 stub agents (echo, handoff). No network, deterministic.
provider = "mock"
model_id = "mock-stub"
prompt_usd_per_mtok = 0.0
output_usd_per_mtok = 0.0
default_max_tokens = 256

#
# Agent -> model routing.
# `cost_ceiling_usd` refuses a single call whose estimated cost would exceed it.
#
[agents.lit_review]
model = "claude_haiku"
cost_ceiling_usd = 0.50

[agents.idea_gen]
model = "claude_sonnet"
cost_ceiling_usd = 1.00

[agents.idea_critic]
model = "claude_sonnet"
cost_ceiling_usd = 1.00

[agents.methodology]
model = "claude_sonnet"
cost_ceiling_usd = 2.00

[agents.code_gen]
# 2026-06-12: switched qwen3_coder -> claude_sonnet. The local 30B kept emitting
# internally-inconsistent modules (importing names it never defined -> ImportError),
# which never converged and burned all 3 code_review cycles (~$4.66/run, mostly
# Sonnet input) on code that didn't even import. Cost model (run_bb0e8963): the
# entire code_gen+test_gen workload is only ~$0.5/run priced at Sonnet, vs the ~$3
# of wasted review cycles the bad local output caused — so cloud generation is net
# CHEAPER and actually converges. Revert to "qwen3_coder" (still defined) for local
# $0 generation. code_gen has no `execute` tool, so it can't debug-spin on Sonnet.
# 2026-06-17: flipped BACK to qwen3_coder. The harness fixes that caused the
# non-convergence landed today: prompts de-contaminated (per-project
# {{PROJECT_CONTEXT}} instead of the hardcoded chest-xray block the local model
# followed literally), a read-only `check_imports` tool so code_gen catches phantom
# imports before handoff, and a `handoff` tool for reliable routing. Revert to
# "claude_sonnet" if local generation still won't converge after a live run.
# 2026-06-18 (fix 4): repointed qwen3_coder -> qwen25_coder_32b. Two guided
# live runs showed qwen3-coder (A3B MoE, ~3B active) applies mechanical review
# fixes but keeps reintroducing subtle math/indexing bugs across 3+ cycles and
# never converges within the project budget. Moving to a DENSE 32B coder to get
# more consistent numerical reasoning. Revert: restore model = "qwen3_coder".
# 2026-06-18 (fix 4, take 2): repointed qwen25_32b -> claude_opus_48. BOTH local
# models failed to converge (MoE: subtle math bugs; dense general: file sprawl +
# skipped check_imports, 20 blockers). Going to the strongest model. EXPENSIVE
# ($15/$75 per Mtok) — ceilings raised below for Opus headroom. Revert: restore
# "qwen3_coder" (local $0) or "claude_sonnet" (cheaper cloud).
model = "claude_opus_48"
cost_ceiling_usd = 5.00  # raised 3->5 for Opus (16k-token outputs are ~$1-2/call)
# 2026-06-11: raised 12 -> 30. The first qwen3-coder regen run hit the 12-round
# cap mid-debug (write_file/execute self-test loop), emitted NO HANDOFF, and the
# runner treated that as terminal -> run "completed" after code_gen with 0
# handoffs (never reached test_gen/CP3 -> empty operator console). qwen3-coder
# self-tests more aggressively than qwen2.5 did, so it needs more rounds. The
# cap is a ceiling, not a fixed cost (the loop exits the moment the agent hands
# off) and the model is local ($0), so a higher cap only helps the cut-off case.
max_tool_rounds = 30
invocation_ceiling_usd = 10.00  # raised 4->10 for Opus (cumulative across the round loop)

[agents.test_gen]
# 2026-06-12: switched qwen3_coder -> claude_sonnet alongside code_gen (see the
# code_gen note above for the cost rationale). Sonnet writes tests that match the
# source API it just generated, so the code<->review loop can actually converge.
# 2026-06-17: flipped BACK to qwen3_coder alongside code_gen (harness fixes landed —
# see the code_gen note above). Revert to "claude_sonnet" if convergence regresses.
# 2026-06-18 (fix 4): repointed qwen3_coder -> qwen25_coder_32b alongside
# code_gen (dense 32B coder; see the code_gen note). Keeps the code<->test
# contract on the same model. Revert: restore model = "qwen3_coder".
# 2026-06-18 (fix 4, take 2): repointed qwen25_32b -> claude_opus_48 alongside
# code_gen (strongest model after both local models failed). Same model keeps
# the code<->test contract consistent. EXPENSIVE; ceilings raised. Revert:
# restore "qwen3_coder" or "claude_sonnet".
model = "claude_opus_48"
cost_ceiling_usd = 5.00  # raised 2->5 for Opus
# Lowered 8 -> 4 (2026-05-31 audit) WHEN test_gen ran on Claude and was 62% of
# lifetime spend. That cost rationale is now MOOT: test_gen routes to local
# qwen3-coder ($0). 2026-06-11: raised 4 -> 15 so the local model has room to
# write tests AND emit its HANDOFF before the cap — a 4-round cap would starve
# it the same way code_gen's 12 did. Still a ceiling; the loop exits on handoff.
max_tool_rounds = 15
invocation_ceiling_usd = 8.00  # raised 3->8 for Opus (cumulative across the round loop)

[agents.code_worker]
# Orchestrator worker (2026-06-19). NOT in the normal pipeline — it is invoked
# ONLY by the `delegate` tool when code_gen/test_gen run in "Opus orchestrator"
# mode (operator-selected per leg in the console). Opus 4.8 decomposes the task
# and hands each file-level assignment here; this local worker writes the files
# directly to the sandbox and returns a compact summary. Local => $0, so the
# bulk code-emission cost stays off the cloud bill while Opus only plans and
# spot-checks. 2026-06-22: worker model = qwen3.6:27b (dense 27.8B, THINKING
# mode) via the qwen36_27b alias — re-validated as a clean tool-caller with NO
# oscillation on a realistic file-writing sequence at 64k, and stronger than the
# prior qwen2.5-32b worker (which sprayed files / skipped check_imports).
# Toolset is write-only (no execute / no handoff / no delegate) so the worker
# can't debug-spin or recurse. Revert: repoint `model` to "qwen25_32b".
model = "qwen36_27b"
cost_ceiling_usd = 0.50
max_tool_rounds = 14
invocation_ceiling_usd = 1.00

[agents.code_review]
model = "claude_sonnet"
cost_ceiling_usd = 1.00
invocation_ceiling_usd = 3.00  # cumulative; code_review was 21% of lifetime spend

[agents.results_validator]
model = "claude_sonnet"
cost_ceiling_usd = 1.00
invocation_ceiling_usd = 3.00  # cumulative across the round loop

[agents.figure_gen]
# Figure generation (2026-06-21). Sits between results_validator and paper_writer:
# reads the validated results from sandbox/runs/, writes a matplotlib plotting
# script (scripts/generate_figures.py), runs it with `execute` to render figures
# into sandbox/figures/, then hands the figure paths+captions to paper_writer
# (which embeds them via \includegraphics). Like code_gen it is a code-writing
# agent with a sandbox + execute, and it supports Opus-orchestrator mode
# (operator-selectable per leg at CP4). Default = Sonnet: plotting is lighter
# than the experiment code, and the operator can pick Opus / the Opus-
# orchestrator at the gate. Ceilings give headroom for an Opus-orchestrator leg
# (the agent's calls route to the manager model in that mode).
model = "claude_sonnet"
cost_ceiling_usd = 3.00
max_tool_rounds = 20        # write-script -> execute-render -> fix loop needs room
invocation_ceiling_usd = 8.00

[agents.paper_writer]
model = "claude_opus"
cost_ceiling_usd = 5.00
# Higher cumulative ceiling: opus + multi-round drafting (literature lookups,
# citation checks, latex compile retries) legitimately costs more per invocation.
invocation_ceiling_usd = 12.00

[agents.peer_reviewer]
model = "claude_sonnet"
cost_ceiling_usd = 1.00

[agents.repo_publisher]
# Writes the curated release tree under projects/<id>/release/. Mostly
# mechanical I/O (read sandbox file -> write release file) but the
# READMEs / docstrings benefit from Sonnet-quality writing. Higher
# cost_ceiling than peer_reviewer because the agent may make many
# write_release_file calls in a single invocation.
model = "claude_sonnet"
cost_ceiling_usd = 3.00
max_tool_rounds = 40
invocation_ceiling_usd = 10.00  # many write_release_file rounds; sonnet-priced

# Phase 1 stub agents — used by smoke_phase1 to exercise the runtime
# without spending money or hitting the GPU. The mock provider returns
# deterministic responses keyed by agent name.
[agents.echo]
model = "mock_stub"
cost_ceiling_usd = 0.0

[agents.handoff]
model = "mock_stub"
cost_ceiling_usd = 0.0

# Phase 6 — autoresearch / prompt optimization.
# `judge` scores agent outputs against per-agent rubrics (KICKOFF.md §9).
# `meta_prompter` reads low-scoring traces and proposes prompt variants.
# Both default to claude_sonnet; cost ceilings are tighter because each
# call processes one anchor at a time (judge) or one prompt rewrite
# (meta_prompter) — no long-context payloads expected.
[agents.judge]
model = "claude_sonnet"
cost_ceiling_usd = 0.50

[agents.meta_prompter]
model = "claude_sonnet"
cost_ceiling_usd = 1.00

#
# Budget — global cap, enforced by runtime/budget.py.
# `hard_floor_buffer_usd` is the amount left below the cap before all
# new spend is refused (KICKOFF.md §2: refuse within $5 of the cap).
#
[budget]
monthly_cap_usd = 200.0  # 2026-06-19: raised 150 -> 200 (operator); ~$72 usable after $123 already spent this month
hard_floor_buffer_usd = 5.0
# Cumulative USD ceiling for a SINGLE agent invocation's tool-loop (the sum
# of all rounds), enforced in runtime/runner.py:_invoke_agent. This is the
# layer the 2026-05-31 audit found missing: cost_ceiling_usd bounds ONE call,
# the monthly cap bounds the whole month, but nothing bounded a loop of
# individually-cheap calls that summed to $16+. Per-agent overrides below.
# 0 disables it. The monthly hard cap above is always the final gate.
default_invocation_ceiling_usd = 10.0

#
# Orchestrator mode (2026-06-19).
# When the operator picks "Opus orchestrator" for code_gen/test_gen at an
# approval gate, the runner routes that agent to `manager_model` (Opus 4.8),
# adds the `delegate` tool, and appends orchestrator instructions to its prompt.
# Opus plans + spot-checks; each delegate call runs `worker_agent` (a local
# model) which writes the files. Retarget either tier here without code changes.
#
[orchestrator]
manager_model = "claude_opus_48"  # the planner/reviewer (cloud, strong)
worker_agent = "code_worker"      # the file-writer (see [agents.code_worker]; local, $0)
